services:
  redis:
    image: redis:7-alpine
    container_name: fintoc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fintoc-backend:latest
    container_name: fintoc-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FINTOC_PRIVATE_KEY_PATH=/run/secrets/fintoc_private_key
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    secrets:
      - fintoc_private_key
    volumes:
      - ./backend/app:/app/app  # hot-reload in dev
    depends_on:
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fintoc-backend:latest
    container_name: fintoc-celery-worker
    env_file:
      - .env
    environment:
      - FINTOC_PRIVATE_KEY_PATH=/run/secrets/fintoc_private_key
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - BACKEND_URL=http://backend:8000
    secrets:
      - fintoc_private_key
    volumes:
      - ./backend/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fintoc-backend:latest
    container_name: fintoc-celery-beat
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]

secrets:
  fintoc_private_key:
    file: ~/.ssh/fintoc_private.pem
