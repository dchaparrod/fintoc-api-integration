services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fintoc-backend:latest
    container_name: fintoc-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FINTOC_PRIVATE_KEY_PATH=/run/secrets/fintoc_private_key
    secrets:
      - fintoc_private_key
    volumes:
      - ./backend/app:/app/app  # hot-reload in dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

secrets:
  fintoc_private_key:
    file: ~/.ssh/fintoc_private.pem
